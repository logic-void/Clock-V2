<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>Billu's Clock</title>
        <link
            rel="stylesheet"
            href="https://fonts.cdnfonts.com/css/ds-digital"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Billu's Clock</h1>
        <div class="clock">
            <div class="num-container">
                <div class="num">3</div>
                <div class="num">4</div>
                <div class="num">5</div>
                <div class="num">6</div>
                <div class="num">7</div>
                <div class="num">8</div>
                <div class="num">9</div>
                <div class="num">10</div>
                <div class="num">11</div>
                <div class="num">12</div>
                <div class="num">1</div>
                <div class="num">2</div>
            </div>
            <div class="hour">
                <div class="scale"></div>
                <div class="circle"></div>
            </div>
            <div class="min">
                <div class="scale"></div>
                <div class="circle"></div>
            </div>
            <div class="sec">
                <div class="scale"></div>
                <div class="circle"></div>
            </div>
            <div class="center"></div>
        </div>
        <div class="time-container">
            <span class="hour-text"></span> <span class="colon">:</span>
            <span class="min-text"></span> <span class="colon">:</span>
            <span class="sec-text"></span> <span class="ampm"></span>
        </div>
        <script
            defer
            src="script.js"
            type="text/javascript"
            charset="utf-8"
        ></script>
    </body>
</html>
